name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: install, generate Prisma client, check build ─────────────────
  backend:
    name: Backend (Fastify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-fastify-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-fastify-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Frontend: install, lint, build ────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api/v1
          VITE_WS_URL: ws://localhost/api/v1/chat/ws

  # ── Docker: build both images (only on push to main) ─────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fastify-backend ./my-fastify-app

      - name: Build frontend image
        run: docker build -t fastify-frontend ./frontend
        env:
          VITE_API_URL: /api/v1
          VITE_WS_URL: ws://localhost/api/v1/chat/ws
